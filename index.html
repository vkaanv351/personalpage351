    <script>



        document.addEventListener("DOMContentLoaded" , function() {


        const alertBox = document.getElementById("alertBox");
        const alertTitle = document.getElementById("alertTitle");
        const alertText = document.getElementById("alertText");
        const closeAlert = document.getElementById("closeAlert");
        

        let lastDeletedTask = null;
        let lastDeletedAllTasks = null;
        let lastEditedTask = null;    

        let count = 0;
        
        
        if ("Notification" in window && Notification.permission !== "granted") {

            Notification.requestPermission();

        }



const taskInput = document.querySelector("#taskInput");
const addTaskBtn = document.querySelector("#addTaskBtn");
const taskList = document.querySelector("#taskList");
const taskCategory = document.querySelector("#taskCategory");
const taskPriority = document.querySelector("#taskPriority");

const allBtn = document.querySelector("#allBtn");
const completedBtn = document.querySelector("#completedBtn");
const activeBtn = document.querySelector("#activeBtn");
const clearAllBtn = document.querySelector("#clearAllBtn");
const undoBtn = document.querySelector("#undoBtn");
undoBtn.classList.add("undoDisabled");

const allCount = document.querySelector("#totalCount");
const activeCount = document.querySelector("#activeCount");
const doneCount = document.querySelector("#doneCount");

const schoolBtn = document.querySelector("#schoolBtn");
const personalBtn = document.querySelector("#personalBtn");
const workBtn = document.querySelector("#workBtn");

const schoolCount = document.querySelector("#schoolCount");
const personalCount = document.querySelector("#personalCount");
const workCount = document.querySelector("#workCount");

const searchInput = document.querySelector("#searchInput");
const clearSearchBtn = document.querySelector("#clearSearchBtn");



searchInput.addEventListener("input", function() {

    applySearchFilter();

    if(searchInput.value.trim() !== "") {

        clearSearchBtn.style.display = "block";

    } else {

        clearSearchBtn.style.display = "none";

    }

});



clearSearchBtn.addEventListener("click", function() {

    searchInput.value = "";
    clearSearchBtn.style.display = "none";
    applySearchFilter();
    searchInput.focus();

});



let currentFilter = "all";



allCount.addEventListener("click", function() {

    allBtn.click();

});


activeCount.addEventListener("click", function() {

    activeBtn.click();

});


doneCount.addEventListener("click", function() {

    completedBtn.click();

});


schoolCount.addEventListener("click", function() {

    schoolBtn.click();

});


personalCount.addEventListener("click", function() {

    personalBtn.click();

});


workCount.addEventListener("click", function() {

    workBtn.click();

});


function clearFilterButtons() {

    allBtn.classList.remove("activeFilter");
    completedBtn.classList.remove("activeFilter");
    activeBtn.classList.remove("activeFilter");
    schoolBtn.classList.remove("activeFilter");
    personalBtn.classList.remove("activeFilter");
    workBtn.classList.remove("activeFilter");    

}

function updateUndoButton() {

    undoBtn.classList.remove("undoDisabled" , "undoActive");

    if(lastDeletedTask || lastDeletedAllTasks || lastEditedTask) {

        undoBtn.classList.add("undoActive");

    } else {

        undoBtn.classList.add("undoDisabled");

    }

}

const counter = document.querySelector("#counter");
const increaseBtn = document.querySelector("#increaseBtn");
const decreaseBtn = document.querySelector("#decreaseBtn");
const resetCounterBtn = document.querySelector("#resetCounterBtn");

const taskDate = document.querySelector("#taskDate");



function showAlert(title, text) {

    alertTitle.innerText = title;
    alertText.innerText = text;
    
    alertTitle.classList.remove("alertWarning", "alertReminder");

    if(title === "WARNING !") {

        alertTitle.classList.add("alertWarning");

    } else if(title === "⏰ TASK TIME !") {

        alertTitle.classList.add("alertReminder");

    }

    alertBox.classList.remove("hidden");

}


closeAlert.addEventListener("click" , function(){

    alertBox.classList.add("hidden");
    taskInput.focus();

});

let audioEnabled = false;

const reminderTimeouts = {};
const warningTimeouts = {};

const editingTaskIds = new Set();


taskList.addEventListener("dragover" , function(e) {

    e.preventDefault();

    const afterElement = getDragAfterElement(taskList , e.clientY);
    const dragging = document.querySelector(".dragging");


    if(!dragging) return;

    if(afterElement == null){

        taskList.appendChild(dragging);

    } else {

        taskList.insertBefore(dragging , afterElement);

    }

});


function getDragAfterElement(container , y) {

    const elements = [...container.querySelectorAll("li:not(.dragging)")];

    return elements.reduce((closest , child ) => {

        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;

        if(offset < 0 && offset > closest.offset) {

            return { offset : offset , element : child};

        } else {

            return closest;
            
        }

    } , { offset : Number.NEGATIVE_INFINITY }).element;

}


const colorBtn = document.querySelector("#colorBtn");

colorBtn.addEventListener("click", function(){

    document.body.classList.toggle("dark-mode");

if(document.body.classList.contains("dark-mode")) {

    localStorage.setItem("theme" , "dark");

} else {

    localStorage.setItem("theme" , "light");

}

updateColor();

});


increaseBtn.addEventListener("click", function(){
    count++;
    counter.innerText = count;
    updateColor();
});

decreaseBtn.addEventListener("click", function(){
    count--;
    counter.innerText = count;
    updateColor();
});

resetCounterBtn.addEventListener("click", function(){
    count = 0;
    counter.innerText = count;
    updateColor();
});

function updateColor(){

    if(count < 0){
        counter.style.color = "red";
    }
    else if(count > 10){
        counter.style.color = "green";
    }
    else{
        if(document.body.classList.contains("dark-mode")) {

            counter.style.color = "#bbb";

        } else {

            counter.style.color = "black";

        }
    }

}

if(localStorage.getItem("theme") === "dark") {

    document.body.classList.add("dark-mode");

}

renderTasks();
allBtn.classList.add("activeFilter");

updateUndoButton();


getTasks().forEach(function(task) {

    scheduleReminder(task);

})



setInterval(function() {

    const tasks = getTasks();
    const now = new Date().getTime();

    tasks.forEach(function(task) {

        if(!task.completed && task.date) {

            const taskTime = new Date(task.date).getTime();

            if(now >= taskTime && !task.notified) {

                if ("Notification" in window && Notification.permission === "granted") {

                    new Notification("⏰ REMINDER !" , {

                        body : task.text + " TIME HAS COME !"
                        
                    });

                }

                showAlert("⏰ TASK TIME !" , task.text);

                task.notified = true;
                saveTasks(tasks);

            }

        }

    });

}, 1000);



// ENTER ile ekleme
taskInput.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        addTaskBtn.click();
    }
});

// EKLE
addTaskBtn.addEventListener("click", function(){

    const taskText = taskInput.value.trim();
    const dateValue = taskDate.value;
    const categoryValue = taskCategory.value;
    const priorityValue = taskPriority.value;

    if(taskText === "") {

        showAlert("WARNING !", "PLEASE DO NOT LEAVE THE TASK TEXT EMPTY!");
        return;

    }
    

    if(dateValue) {

        const selectedTime = new Date(dateValue).getTime();
        const now = new Date().getTime();

        if(selectedTime < now) {

            showAlert("WARNING !", "YOU CANNOT SELECT A PAST DATE AND TIME!");
            return;

        }

    }

    
    const tasks = getTasks();

    const newTask = {

        id : Date.now() ,
        text : taskText ,
        category : categoryValue ,
        priority : priorityValue ,
        date : dateValue ,
        completed : false ,
        notified : false

    };


    tasks.push(newTask);
    saveTasks(tasks);
    scheduleReminder(newTask);
    renderTasks();

    showAlert("SUCCESS" , "TASK ADDED!");

    taskInput.value = "";
    taskDate.value = "";
    taskCategory.value = "SCHOOL";
    taskPriority.value = "LOW";
    

});

// 🔥 filtreler

allBtn.addEventListener("click", function(){
    currentFilter = "all";
    taskCategory.value = "SCHOOL";

    document.querySelectorAll("#taskList li").forEach(li=>{
        li.style.display = "flex";

    });

    clearFilterButtons();
    allBtn.classList.add("activeFilter");

});

completedBtn.addEventListener("click", function(){
    currentFilter = "completed";
    taskCategory.value = "SCHOOL";

    document.querySelectorAll("#taskList li").forEach(li=>{
        li.style.display = li.classList.contains("completed") ? "flex" : "none";

    });

    clearFilterButtons();
    completedBtn.classList.add("activeFilter");

});

activeBtn.addEventListener("click", function(){
    currentFilter = "active";
    taskCategory.value = "SCHOOL";

    document.querySelectorAll("#taskList li").forEach(li=>{
        li.style.display = !li.classList.contains("completed") ? "flex" : "none";

    });

    clearFilterButtons();
    activeBtn.classList.add("activeFilter");

});


schoolBtn.addEventListener("click", function(){

    currentFilter = "school";
    taskCategory.value = "SCHOOL";

    document.querySelectorAll("#taskList li").forEach(li=>{
        li.style.display = li.dataset.category === "SCHOOL" ? "flex" : "none";

    });

    clearFilterButtons();
    schoolBtn.classList.add("activeFilter");

});


personalBtn.addEventListener("click", function(){

    currentFilter = "personal";
    taskCategory.value = "PERSONAL";

    document.querySelectorAll("#taskList li").forEach(li=>{
        li.style.display = li.dataset.category === "PERSONAL" ? "flex" : "none";

    });

    clearFilterButtons();
    personalBtn.classList.add("activeFilter");

});


workBtn.addEventListener("click", function(){

    taskCategory.value = "WORK";

function applyCurrentFilter() {

    if(currentFilter === "all") {

        allBtn.click();

        completedBtn.click();

    } else if(currentFilter === "active") {

        activeBtn.click();

    } else if(currentFilter === "school") {

    } else if(currentFilter === "personal") {

        personalBtn.click();

    } else if(currentFilter === "work") {

        workBtn.click();
    }

    applySearchFilter();

function applySearchFilter() {

    const searchText = searchInput.value.toLowerCase();

    document.querySelectorAll("#taskList li").forEach(function(li) {

        if(li.classList.contains("emptyMessage")) return;

        const text = li.innerText.toLowerCase();
        const category = li.dataset.category;

        let matchesFilter = false;

        if(currentFilter === "all") {

            matchesFilter = true;

        } else if(currentFilter === "completed") {

            matchesFilter = li.classList.contains("completed");

        } else if(currentFilter === "active") {

            matchesFilter = !li.classList.contains("completed");

        } else if(currentFilter === "school") {

            matchesFilter = category === "SCHOOL";

        } else if(currentFilter === "personal") {

            matchesFilter = category === "PERSONAL";

        } else if(currentFilter === "work") {

            matchesFilter = category === "WORK";

        }


        const matchesSearch = text.includes(searchText);

        if(matchesFilter && matchesSearch) {

            li.style.display = "flex";

        } else {

            li.style.display = "none";

        }

    });

}

            if(lastDeletedAllTasks) {

                });

                updateUndoButton();
                renderTasks();
                return;

            }

            if(lastEditedTask) {

                    if(task.id === lastEditedTask.id) {

                        return lastEditedTask;

                    }
                    return task;

                });

                saveTasks(updatedTasks);
                scheduleReminder(lastEditedTask);

                lastEditedTask = null;
                updateUndoButton();

            const tasks = getTasks();

function getTasks() {

    try {

        return JSON.parse(localStorage.getItem("tasks")) || [];

    } catch(e) {

        return [];

    }

}


function saveTasks(tasks) {

    localStorage.setItem("tasks" , JSON.stringify(tasks));

}

function scheduleReminder(task) {

    if(reminderTimeouts[task.id]) {

        clearTimeout(reminderTimeouts[task.id])

    }

    if(warningTimeouts[task.id]) {

        clearTimeout(warningTimeouts[task.id]);

    }

    if(!task.date) return;
    if(task.completed) return;

    const selectedTime = new Date(task.date).getTime();
    const now = new Date().getTime();
    const delay = selectedTime - now;

    if(delay <= 0) return;

    reminderTimeouts[task.id] = setTimeout(function() {

        if ("Notification" in window && Notification.permission === "granted") {

            new Notification("⏰ REMINDER !" , {

                body : task.text + " TIME HAS COME !"
                
            });

        }

        showAlert("⏰ TASK TIME !", "YOUR TASK : " + task.text);

        if(audioEnabled) {

            const audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3")
            audio.play();

        }

    } , delay);

    if(delay > 10000) {

        warningTimeouts[task.id] = setTimeout(function() {

            if ("Notification" in window && Notification.permission === "granted") {

                new Notification("⚠️ WARNING !" , {

                    body : task.text + " WILL START IN 10 SECONDS !"
                    
                });

            }

        } , delay - 10000);

    }

}

function updateDoneCount() {

    const items = document.querySelectorAll("#taskList li:not(.emptyMessage)");
    let done = 0;
    let school = 0;
    let personal = 0;
    let work = 0;


    items.forEach(function(li) {

        if(li.classList.contains("completed")) {

            done++;

        }

        if(li.dataset.category === "SCHOOL") {

            school++;

        }

        else if(li.dataset.category === "PERSONAL") {

            personal++;

        }

        else if(li.dataset.category === "WORK") {

            work++;

        }   

    });

    const total = items.length;
    const active = total - done;

    document.getElementById("doneCount").innerText = "COMPLETED : " + done;
    document.getElementById("totalCount").innerText = "TOTAL : " + total;
    document.getElementById("activeCount").innerText = "ACTIVE : " + active;

    document.getElementById("schoolCount").innerText = "SCHOOL : " + school;
    document.getElementById("personalCount").innerText = "PERSONAL : " + personal;
    document.getElementById("workCount").innerText = "WORK : " + work;

}
